apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taskflow-backend
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - taskflow
  selector:
    matchLabels:
      app: taskflow
      component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
